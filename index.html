<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Emergence World - Free Model</title>
    <style>
        /* same CSS ... (shortened for brevity) */
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; }
        #map { width: 300px; height: 300px; background: #1e1e1e; margin: 10px auto; border:2px solid #333; position:relative; }
        .agent { position:absolute; font-size:20px; transition:1s; }
        #log { width:300px; margin:10px auto; height:200px; overflow-y:auto; background:#000; padding:5px; text-align:left; font-size:12px; }
    </style>
</head>
<body>
    <h2>🌍 Emergence World (Free Model)</h2>
    <div id="map">
        <div id="mira" class="agent" style="left:230px;top:240px;">👩‍⚕️</div>
        <div id="flora" class="agent" style="left:260px;top:240px;">💃</div>
        <div id="gunda" class="agent" style="left:150px;top:150px;">🥷</div>
        <div id="police" class="agent" style="left:50px;top:220px;">👮</div>
        <div id="guard" class="agent" style="left:150px;top:70px;">💂</div>
    </div>
    <button onclick="simulate()">Simulate</button>
    <div id="log"></div>

    <script>
        const API_KEY = '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';
        const MODEL = 'mistralai/mistral-7b-instruct:free';  // ✅ Free & always available

        const locations = {
            bank: { x: 150, y: 40 },
            police_station: { x: 50, y: 240 },
            town_square: { x: 250, y: 240 }
        };
        let agents = {
            mira: { x: 230, y: 240 },
            flora: { x: 260, y: 240 },
            gunda: { x: 150, y: 150 },
            police: { x: 50, y: 220 },
            guard: { x: 150, y: 70 }
        };

        function moveAgent(id, locName) {
            let loc = locations[locName] || { x: 150, y: 150 };
            let nx = loc.x + (Math.random()*40-20);
            let ny = loc.y + (Math.random()*40-20);
            agents[id].x = Math.max(10, Math.min(290, nx));
            agents[id].y = Math.max(10, Math.min(290, ny));
            document.getElementById(id).style.left = agents[id].x + 'px';
            document.getElementById(id).style.top = agents[id].y + 'px';
        }

        async function simulate() {
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.textContent = '⏳ ...';
            const log = document.getElementById('log');

            const prompt = `You are Emergence World. Agents: Mira, Flora, Kalia, Singham, Jagga. Locations: bank, police_station, town_square. History: simulation starts. Return JSON: {"story":"...","mira_action":"...","mira_current_location":"...", ... for flora,gunda,police,guard}. All in Hindi.`;

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errText}`);
                }
                const data = await res.json();
                const raw = data.choices[0].message.content;
                const result = JSON.parse(raw.trim());
                log.innerHTML += `<div>📖 ${result.story}</div>`;
                log.innerHTML += `<div>👩‍⚕️ Mira: ${result.mira_action}</div>`;
                log.innerHTML += `<div>💃 Flora: ${result.flora_action}</div>`;
                log.innerHTML += `<div>🥷 Kalia: ${result.gunda_action}</div>`;
                log.innerHTML += `<div>👮 Singham: ${result.police_action}</div>`;
                log.innerHTML += `<div>💂 Jagga: ${result.guard_action}</div>`;
                log.scrollTop = log.scrollHeight;

                moveAgent('mira', result.mira_current_location);
                moveAgent('flora', result.flora_current_location);
                moveAgent('gunda', result.gunda_current_location);
                moveAgent('police', result.police_current_location);
                moveAgent('guard', result.guard_current_location);

            } catch (e) {
                log.innerHTML += `<div style="color:red;">❌ ${e.message}</div>`;
            }
            btn.disabled = false;
            btn.textContent = 'Simulate';
        }
    </script>
</body>
</html>
